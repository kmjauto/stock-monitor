name: 📊 가격 업데이트 & 알림

on:
  schedule:
    - cron: '*/15 * * * *'   # 15분마다 (GitHub 서버 기준, 실제 도달은 ±10분 오차)
  workflow_dispatch:           # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 가격 수집 & 알림 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/fetch-prices.mjs

      # 커밋 & 푸시 비활성화 (HTML 대시보드 업데이트 중단, 텔레그램 알림은 유지)
